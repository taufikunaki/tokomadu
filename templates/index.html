<!DOCTYPE html>
<html>
<head>
    <title>Toko Madu</title>

    <!-- Icon Browser -->
    <link rel="icon" type="image/svg+xml"
          href="https://commons.wikimedia.org/wiki/Special:FilePath/Honey%20Jar%20icon.svg">

    <!-- WAJIB -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS kamu -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="text-center text-white py-4" style="background:#f4a261;">
    <h1>🍯 Toko Madu Alami</h1>
    <p>Sehat Alami, Langsung dari Alam</p>
</header>

<div class="container mt-4">
    <div class="row">

        {% for p in products %}
        <div class="col-12 col-sm-6 col-md-4 mb-4">
            <div class="card h-100 shadow text-center">

                <img src="/static/{{ p.gambar }}" class="card-img-top">

                <div class="card-body">
                    <h5 class="card-title">{{ p.nama }}</h5>
                    <p class="card-text">{{ p.harga }}</p>

                    <a href="https://wa.me/6285869047186?text={{ ('Halo admin, saya ingin beli ' ~ p.nama ~ ' dengan harga ' ~ p.harga)|urlencode }}" 
                       target="_blank" 
                       class="btn btn-success w-100">
                       Beli via WhatsApp
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

<!-- TOOLTIP -->
<div id="chat-tooltip">
    Ada yang bisa saya bantu?
</div>

<!-- ICON -->
<div id="chat-icon" onclick="openChat()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-icon">
</div>

<!-- CHATBOX -->
<div class="chat-container" id="chat-container">
    <div class="chat-header">
        Chat Admin 
        <span onclick="closeChat()" style="float:right;cursor:pointer;">✖</span>
    </div>
    
    <div id="chat-content">
        <div id="chat-box"></div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ketik pesan..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
// ================== CHAT ==================
function sendMessage() {
    let input = document.getElementById("userInput").value;
    let chatBox = document.getElementById("chat-box");

    if (input.trim() === "") return;

    chatBox.innerHTML += `<div class="chat user">${input}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        chatBox.innerHTML += `<div class="chat bot">${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    document.getElementById("userInput").value = "";
}

function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

// ================== STATE ==================
let isChatOpen = false;
let tooltipInterval;

// ================== CHAT OPEN/CLOSE ==================
function openChat() {
    isChatOpen = true;

    document.getElementById("chat-container").style.display = "block";
    document.getElementById("chat-icon").style.display = "none";

    let tooltip = document.getElementById("chat-tooltip");
    tooltip.style.display = "none";
}

function closeChat() {
    isChatOpen = false;

    document.getElementById("chat-container").style.display = "none";
    document.getElementById("chat-icon").style.display = "flex";
}

// ================== TOOLTIP ==================
function showTooltipLoop() {
    let tooltip = document.getElementById("chat-tooltip");

    // ❗ STOP kalau chat sedang dibuka
    if (isChatOpen) return;

    tooltip.style.display = "block";
    tooltip.style.animation = "fadeSlideIn 0.5s forwards";

    setTimeout(() => {
        tooltip.style.animation = "fadeSlideOut 0.5s forwards";
    }, 4000);
}

// ================== START LOOP ==================
setTimeout(() => {
    showTooltipLoop();
    tooltipInterval = setInterval(showTooltipLoop, 7000);
}, 3000);

</script>

</body>
</html>
